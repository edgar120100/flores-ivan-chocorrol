<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Pantalla inicial */
.inicio {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: linear-gradient(#000, #222);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    transition: opacity 1s;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* Pantalla flores */
.flores {
    width: 100%;
    height: 100vh;
    background: url('https://i.imgur.com/e25sQnA.jpeg') no-repeat center;
    background-size: contain;
    background-color: black;
    position: relative;
    color: white;
    text-align: center;
    opacity: 0;
    transition: opacity 2s;
}

/* Texto */
.texto {
    position: absolute;
    top: 20%;
    width: 100%;
    text-shadow: 2px 2px 5px black;
}

/* Flores */
.flower {
    position: absolute;
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px yellow;
    animation: caer linear infinite;
}

@keyframes caer {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- Inicio -->
<div class="inicio" id="inicio">
    <h1>🌻 Tengo algo para ti</h1>
    <button onclick="mostrar()">Ver regalo 💛</button>
</div>

<!-- Flores -->
<div class="flores" id="flores">
    <div class="texto">
        <h1>Para ti, Iván 🌻</h1>
        <p id="mensaje"></p>
    </div>

    <audio id="musica" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
    </audio>
</div>

<script>
function mostrar() {
    const inicio = document.getElementById("inicio");
    const flores = document.getElementById("flores");

    inicio.style.opacity = "0";
    setTimeout(() => {
        inicio.style.display = "none";
    }, 1000);

    flores.style.opacity = "1";

    document.getElementById("musica").play();

    escribir();
}

/* Texto animado */
const texto = `No sé en qué momento te volviste tan importante para mí...
pero hay días en los que todo me lleva a ti.

Intento seguir como si nada,
pero la verdad es que te extraño más de lo que quisiera admitir.

No es solo extrañarte a ti,
es extrañar cómo me sentía contigo.

Y aunque no diga todo lo que siento,
hay algo que sigue aquí… y eres tú 💛`;

let i = 0;

function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 35);
    }
}

/* Flores dinámicas */
function crearFlor() {
    const flor = document.createElement("div");
    flor.classList.add("flower");
    flor.style.left = Math.random() * window.innerWidth + "px";
    flor.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 8000);
}

setInterval(crearFlor, 200);
</script>

</body>
</html>
