<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(#87CEEB, #fff);
        overflow: hidden;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    h1 {
        margin-top: 50px;
        color: #444;
        animation: fadeIn 3s ease-in-out;
    }

    p {
        color: #666;
        font-size: 18px;
        animation: fadeIn 5s ease-in-out;
    }

    .flower {
        position: absolute;
        width: 40px;
        height: 40px;
        background: yellow;
        border-radius: 50%;
        box-shadow: 0 0 10px gold;
        animation: fall linear infinite;
    }

    .flower::before, .flower::after {
        content: '';
        position: absolute;
        width: 40px;
        height: 40px;
        background: yellow;
        border-radius: 50%;
    }

    .flower::before {
        top: -20px;
        left: 0;
    }

    .flower::after {
        top: 0;
        left: -20px;
    }

    @keyframes fall {
        0% {
            transform: translateY(-50px);
            opacity: 1;
        }
        100% {
            transform: translateY(100vh);
            opacity: 0;
        }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>
</head>

<body>

<h1>🌻 Para ti 🌻</h1>
<p>Porque te extraño… y quería sacarte una sonrisa 💛</p>

<script>
function createFlower() {
    const flower = document.createElement("div");
    flower.classList.add("flower");

    flower.style.left = Math.random() * window.innerWidth + "px";
    flower.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(flower);

    setTimeout(() => {
        flower.remove();
    }, 8000);
}

setInterval(createFlower, 300);
</script>

</body>
</html>
