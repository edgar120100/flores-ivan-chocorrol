<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: url('https://i.imgur.com/e25sQnA.jpeg') no-repeat center center/cover;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-shadow: 2px 2px 5px black;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    line-height: 1.5;
}

.flower {
    position: absolute;
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px yellow;
    animation: fall linear infinite;
}

.flower::before, .flower::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
}

.flower::before {
    top: -10px;
}

.flower::after {
    left: -10px;
}

@keyframes fall {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="container">
    <h1 id="titulo"></h1>
    <p id="texto"></p>
</div>

<!-- Música -->
<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
const titulo = "🌻 Para ti, Iván 🌻";
const mensaje = `No sé en qué momento te volviste tan importante para mí...
pero hay días en los que todo me lleva a ti.

Intento seguir como si nada,
pero la verdad es que te extraño más de lo que quisiera admitir.

No es solo extrañarte a ti,
es extrañar cómo me sentía contigo.

Y aunque no diga todo lo que siento,
hay algo que sigue aquí… y eres tú 💛`;

let i = 0;
let j = 0;

function escribirTitulo() {
    if (i < titulo.length) {
        document.getElementById("titulo").innerHTML += titulo.charAt(i);
        i++;
        setTimeout(escribirTitulo, 80);
    } else {
        escribirTexto();
    }
}

function escribirTexto() {
    if (j < mensaje.length) {
        document.getElementById("texto").innerHTML += mensaje.charAt(j);
        j++;
        setTimeout(escribirTexto, 35);
    }
}

escribirTitulo();

function crearFlor() {
    const flor = document.createElement("div");
    flor.classList.add("flower");
    flor.style.left = Math.random() * window.innerWidth + "px";
    flor.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 8000);
}

setInterval(crearFlor, 300);
</script>

</body>
</html>
