<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

/* Pantalla inicial */
.inicio {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 1s;
    z-index: 10;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: gold;
    border: none;
    border-radius: 10px;
}

/* Pantalla principal */
.contenido {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    color: white;
    text-align: center;
    opacity: 0;
    transition: opacity 2s;
}

/* Texto */
.texto {
    position: absolute;
    top: 40%;
    width: 100%;
    padding: 0 20px;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 5px black;
}

/* Imagen final */
.final {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: url('https://i.imgur.com/e25sQnA.jpeg') no-repeat center;
    background-size: contain;
    background-color: black;
    opacity: 0;
    transition: opacity 2s;
}

/* Flores */
.flower {
    position: absolute;
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px yellow;
    animation: caer linear infinite;
}

@keyframes caer {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- Pantalla inicial -->
<div class="inicio" id="inicio">
    <h1>🌻 Tengo algo para ti amor</h1>
    <button onclick="start()">Abrir 💛</button>
</div>

<!-- Contenido -->
<div class="contenido" id="contenido">
    <div class="texto" id="texto"></div>
</div>

<!-- Imagen final -->
<div class="final" id="final"></div>

<!-- Música -->
<iframe width="0" height="0" 
src="https://youtu.be/gu3-SxUx9gw?si=ueEbujgblM54buRw" 
allow="autoplay">
</iframe>

<script>
function start() {
    document.getElementById("inicio").style.opacity = "0";

    setTimeout(() => {
        document.getElementById("inicio").style.display = "none";
        document.getElementById("contenido").style.opacity = "1";
        historia();
        activarFlores();
    }, 1000);
}

/* Mensajes */
const mensajes = [
    "🌻 Para ti mi Flaco, mi Ivan 💛",
    "Hoy todos regalan flores amarillas...",
    "pero yo quise regalarte algo más mío 💛",
    "No pude estar contigo, abrazarte o verte sonreír...",
    "pero hice esto pensando en ti...",
    "para que sientas lo mucho que te amo incluso a la distancia.",
    "Eres mi alegría, mi calma y mi lugar favorito...",
    "estés donde estés.",
    "Tú me haces los días más bellos ❤️",
    "🌼 Te amo muchísimo 🌼"
];

let index = 0;

function historia() {
    if (index < mensajes.length) {
        document.getElementById("texto").innerHTML = mensajes[index];
        index++;
        setTimeout(historia, 2500);
    } else {
        mostrarFinal();
    }
}

/* Mostrar imagen al final */
function mostrarFinal() {
    document.getElementById("contenido").style.opacity = "0";

    setTimeout(() => {
        document.getElementById("final").style.opacity = "1";
    }, 2000);
}

/* Flores */
function activarFlores() {
    setInterval(() => {
        const flor = document.createElement("div");
        flor.classList.add("flower");
        flor.style.left = Math.random() * window.innerWidth + "px";
        flor.style.animationDuration = (3 + Math.random() * 5) + "s";
        document.body.appendChild(flor);

        setTimeout(() => flor.remove(), 8000);
    }, 200);
}
</script>

</body>
</html>
