<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

.inicio {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: opacity 1s;
    z-index: 10;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: gold;
    border: none;
    border-radius: 10px;
}

.flores {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: url('https://i.imgur.com/e25sQnA.jpeg') no-repeat center;
    background-size: contain;
    background-color: black;
    opacity: 0;
    transition: opacity 2s;
    color: white;
    text-align: center;
}

.texto {
    position: absolute;
    top: 35%;
    width: 100%;
    padding: 0 20px;
    text-shadow: 2px 2px 5px black;
}

.flower {
    position: absolute;
    width: 20px;
    height: 20px;
    background: gold;
    border-radius: 50%;
    box-shadow: 0 0 10px yellow;
    animation: caer linear infinite;
}

@keyframes caer {
    0% { transform: translateY(-50px); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="inicio" id="inicio">
    <h1>🌻 Tengo algo para ti</h1>
    <button onclick="start()">Abrir 💛</button>
</div>

<div class="flores" id="flores">
    <div class="texto" id="texto"></div>

    <audio id="musica" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
    </audio>
</div>

<script>
function start() {
    document.getElementById("inicio").style.opacity = "0";

    setTimeout(() => {
        document.getElementById("inicio").style.display = "none";
        document.getElementById("flores").style.opacity = "1";
        document.getElementById("musica").play();
        historia();
    }, 1000);
}

const mensajes = [
    "🌻 Para ti 💛",
    "Hoy todos regalan flores amarillas...",
    "pero yo quise regalarte algo más mío 💛",
    "No pude estar contigo, abrazarte o verte sonreír...",
    "pero hice esto pensando en ti...",
    "para que sientas lo mucho que te amo incluso a la distancia.",
    "Eres mi alegría, mi calma y mi lugar favorito...",
    "estés donde estés.",
    "Tú me haces los días más bellos ❤️",
    "🌼 Te amo muchísimo 🌼"
];

let index = 0;

function historia() {
    if (index < mensajes.length) {
        document.getElementById("texto").innerHTML = "<h2>" + mensajes[index] + "</h2>";
        index++;
        setTimeout(historia, 2500);
    } else {
        activarFlores();
    }
}

function activarFlores() {
    setInterval(() => {
        const flor = document.createElement("div");
        flor.classList.add("flower");
        flor.style.left = Math.random() * window.innerWidth + "px";
        flor.style.animationDuration = (3 + Math.random() * 5) + "s";
        document.body.appendChild(flor);

        setTimeout(() => flor.remove(), 8000);
    }, 300);
}
</script>

</body>
</html>
